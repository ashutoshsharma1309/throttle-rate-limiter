# One command up: `docker compose up --build` brings up Redis + Throttle with
# both transports listening (REST 8080, gRPC 50051 once M4 lands).
services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      HTTP_PORT: "8080"
      GRPC_PORT: "50051"
      REDIS_URL: redis://redis:6379
      FAIL_OPEN: "true"
      ADMIN_API_KEY: dev-admin-key-change-me
    ports:
      - "8080:8080"
      - "50051:50051"
    restart: unless-stopped
