name: Deploy (Fly.io)

# Deploys on green push to main. No-ops until you set the FLY_API_TOKEN repo
# secret (Settings → Secrets → Actions), so the repo stays green pre-setup.
on:
  push:
    branches: [main]

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN not set — skipping deploy. See DEPLOY.md."
            exit 0
          fi
          flyctl deploy --remote-only
