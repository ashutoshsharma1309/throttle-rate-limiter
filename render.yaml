# Render Blueprint — deploys Throttle as a free Docker web service.
# Redis is external (Upstash free tier). REST is the public surface; the gRPC
# port is internal only (Render routes a single port per service). See DEPLOY.md.
#
# REDIS_URL and ADMIN_API_KEY are marked sync:false — set them in the Render
# dashboard so secrets never live in the repo.
services:
  - type: web
    name: throttle
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: FAIL_OPEN
        value: "true"
      # Upstash latency from another region can exceed 50ms; keep it generous.
      - key: REDIS_COMMAND_TIMEOUT_MS
        value: "200"
      # Render injects PORT; the app honors it automatically (no HTTP_PORT here).
      - key: REDIS_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
